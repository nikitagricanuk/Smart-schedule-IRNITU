name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-master
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: smart-schedule-irnitu

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Lint
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Compose Build Check
        run: docker compose build tg_bot getting_schedule functions_api

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        service: [tg_bot, getting_schedule, functions_api]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest

  deploy:
    name: Deploy To FINSRV
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Encode production compose
        id: compose
        run: |
          echo "content_b64=$(base64 -w 0 deploy/docker-compose.prod.yml)" >> "$GITHUB_OUTPUT"

      - name: Deploy images
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_B64: ${{ steps.compose.outputs.content_b64 }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          envs: COMPOSE_B64
          script: |
            set -e

            DEPLOY_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="$HOME/Smart-schedule-IRNITU"
            fi
            mkdir -p "$DEPLOY_DIR/deploy"
            cd "$DEPLOY_DIR"

            echo "$COMPOSE_B64" | base64 -d > deploy/docker-compose.prod.yml

            cat > deploy/.deploy.env <<EOF
            IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAMESPACE }}
            IMAGE_TAG=${{ github.sha }}
            EOF

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_READ_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            else
              echo "GHCR credentials are not set in Actions secrets, using existing server docker auth/public access."
            fi

            $COMPOSE -f deploy/docker-compose.prod.yml --env-file .env --env-file deploy/.deploy.env pull tg_bot getting_schedule functions_api
            $COMPOSE -f deploy/docker-compose.prod.yml --env-file .env --env-file deploy/.deploy.env up -d mongodb functions_api getting_schedule tg_bot
            $COMPOSE -f deploy/docker-compose.prod.yml --env-file .env --env-file deploy/.deploy.env ps
